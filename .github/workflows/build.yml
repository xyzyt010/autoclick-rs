name: Build Linux Binaries

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-x86_64:
    name: x86_64-unknown-linux-musl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-x86_64-musl-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Strip binary
        run: strip target/x86_64-unknown-linux-musl/release/autoclick-rs || true

      - name: Verify static
        run: |
          file target/x86_64-unknown-linux-musl/release/autoclick-rs
          ldd target/x86_64-unknown-linux-musl/release/autoclick-rs 2>&1 | grep -i "not a dynamic executable" || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: autoclick-rs-x86_64
          path: target/x86_64-unknown-linux-musl/release/autoclick-rs

  build-aarch64:
    name: aarch64-unknown-linux-musl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu musl-tools

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-aarch64-musl-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target aarch64-unknown-linux-musl

      - name: Strip binary
        run: aarch64-linux-gnu-strip target/aarch64-unknown-linux-musl/release/autoclick-rs || true

      - name: Verify static
        run: file target/aarch64-unknown-linux-musl/release/autoclick-rs

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: autoclick-rs-aarch64
          path: target/aarch64-unknown-linux-musl/release/autoclick-rs

  release:
    name: Create Release
    needs: [build-x86_64, build-aarch64]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/autoclick-rs-x86_64/autoclick-rs release/autoclick-rs-linux-x86_64
          cp artifacts/autoclick-rs-aarch64/autoclick-rs release/autoclick-rs-linux-aarch64
          chmod +x release/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
