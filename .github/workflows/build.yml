name: Build Linux Binaries

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-x86_64:
    name: x86_64-unknown-linux-gnu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev libx11-dev libxkbcommon-dev libwayland-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-x86_64-gnu-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Strip binary
        run: strip target/release/autoclick-rs

      - name: Verify
        run: |
          file target/release/autoclick-rs
          ldd target/release/autoclick-rs

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: autoclick-rs-x86_64
          path: target/release/autoclick-rs

  build-aarch64:
    name: aarch64-unknown-linux-gnu
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev libx11-dev libxkbcommon-dev libwayland-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-aarch64-gnu-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Strip binary
        run: strip target/release/autoclick-rs

      - name: Verify
        run: |
          file target/release/autoclick-rs
          ldd target/release/autoclick-rs

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: autoclick-rs-aarch64
          path: target/release/autoclick-rs

  release:
    name: Create Release
    needs: [build-x86_64, build-aarch64]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/autoclick-rs-x86_64/autoclick-rs release/autoclick-rs-linux-x86_64
          cp artifacts/autoclick-rs-aarch64/autoclick-rs release/autoclick-rs-linux-aarch64
          chmod +x release/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
