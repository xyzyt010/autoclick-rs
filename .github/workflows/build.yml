name: Build All Platforms

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows-x86_64:
    name: Windows x86_64
    runs-on: windows-latest
    defaults:
      run:
        working-directory: windows
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            windows/target
          key: ${{ runner.os }}-windows-x86_64-${{ hashFiles('windows/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: autoclick-rs-windows-x86_64
          path: windows/target/release/autoclick-rs.exe

  build-linux-x86_64:
    name: Linux x86_64
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linux
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev libx11-dev libxkbcommon-dev libwayland-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            linux/target
          key: ${{ runner.os }}-linux-x86_64-${{ hashFiles('linux/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Strip binary
        run: strip target/release/autoclick-rs

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: autoclick-rs-linux-x86_64
          path: linux/target/release/autoclick-rs

  build-linux-aarch64:
    name: Linux aarch64
    runs-on: ubuntu-24.04-arm
    defaults:
      run:
        working-directory: linux
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev libx11-dev libxkbcommon-dev libwayland-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            linux/target
          key: ${{ runner.os }}-linux-aarch64-${{ hashFiles('linux/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Strip binary
        run: strip target/release/autoclick-rs

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: autoclick-rs-linux-aarch64
          path: linux/target/release/autoclick-rs

  build-macos-aarch64:
    name: macOS aarch64
    runs-on: macos-14
    defaults:
      run:
        working-directory: macos
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            macos/target
          key: ${{ runner.os }}-macos-aarch64-${{ hashFiles('macos/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: autoclick-rs-macos-aarch64
          path: macos/target/release/autoclick-rs

  release:
    name: Create Release
    needs: [build-windows-x86_64, build-linux-x86_64, build-linux-aarch64, build-macos-aarch64]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/autoclick-rs-windows-x86_64/autoclick-rs.exe release/autoclick-rs-windows-x86_64.exe
          cp artifacts/autoclick-rs-linux-x86_64/autoclick-rs release/autoclick-rs-linux-x86_64
          cp artifacts/autoclick-rs-linux-aarch64/autoclick-rs release/autoclick-rs-linux-aarch64
          cp artifacts/autoclick-rs-macos-aarch64/autoclick-rs release/autoclick-rs-macos-aarch64
          chmod +x release/autoclick-rs-linux-* release/autoclick-rs-macos-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
